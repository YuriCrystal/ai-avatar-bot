<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="referrer" content="no-referrer" />
<title>AI Bot Widget</title>
<style>
  :root{
    --brand:#5b54e8; --brand-2:#7d78f0; --ink:#222033;
    --surface:rgba(255,255,255,.97); --dock:rgba(26,28,46,.58);
  }
  html, body { margin:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  *, *::before, *::after { box-sizing:border-box; }
  #stage { position:absolute; inset:0; }
  .avatar-canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ===== 底部控制 dock（毛玻璃）===== */
  #control-bar {
    position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
    width:calc(100% - 20px); max-width:340px;
    display:flex; flex-direction:column; gap:5px; padding:6px; border-radius:18px;
    background:var(--dock); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3);
    box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
  }
  .dock-row { display:flex; gap:5px; align-items:center; }
  #voice-live { display:none; min-height:25px; align-items:center; gap:7px; padding:2px 7px; color:#fff; font-size:11px; }
  #voice-live.active { display:flex; }
  .voice-dot { width:8px; height:8px; border-radius:50%; background:#a9abb8; flex:none; }
  #voice-live.listening .voice-dot { background:#ff6255; box-shadow:0 0 0 4px rgba(255,98,85,.18); }
  #voice-live.thinking .voice-dot { background:#f2b34f; }
  #voice-live.speaking .voice-dot { background:#72d4a8; }
  #voice-status { flex:1; min-width:0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .voice-meter { width:62px; height:5px; overflow:hidden; border-radius:99px; background:rgba(255,255,255,.18); }
  #voice-level { display:block; width:0; height:100%; border-radius:inherit; background:linear-gradient(90deg,#72d4a8,#ffcf5c,#ff6255); transition:width .06s linear; }
  #type-input {
    flex:1; min-width:0; appearance:none; border:none; outline:none;
    background:rgba(255,255,255,.92); color:var(--ink); border-radius:12px;
    height:36px; padding:0 12px; font:500 13.5px "Noto Sans TC", system-ui, sans-serif;
  }
  #type-input::placeholder { color:#888da0; }
  #type-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(91,84,232,.5); }
  .ctrl {
    appearance:none; border:none; cursor:pointer; color:#fff; background:rgba(255,255,255,.14);
    height:36px; min-width:36px; padding:0 9px; border-radius:12px; flex-shrink:0; white-space:nowrap;
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    font-size:13.5px; font-weight:600; line-height:1;
    transition:transform .12s, background .15s, filter .15s;
  }
  .ctrl:hover { background:rgba(255,255,255,.26); }
  .ctrl:active { transform:scale(.93); }
  .ctrl:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  .ctrl.primary { background:linear-gradient(135deg,var(--brand-2),var(--brand)); padding:0 13px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ctrl.primary:hover { filter:brightness(1.1); background:linear-gradient(135deg,var(--brand-2),var(--brand)); }
  .ctrl.listening { background:linear-gradient(135deg,#e74c3c,#c0392b)!important; animation:pulse 1.1s infinite; }
  .ctrl.llm-on { background:linear-gradient(135deg,#f2b34f,#e69426); } /* 啟用中＝琥珀，與主色靛藍對比 */
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.55);} 50%{ box-shadow:0 0 0 7px rgba(231,76,60,0);} }

  /* ===== 對話泡泡（帶尾巴）===== */
  #bubble {
    position:absolute; right:14px; top:14px; left:14px;
    background:var(--surface); color:var(--ink); border-radius:16px; padding:11px 14px;
    font-size:14px; line-height:1.55;
    box-shadow:0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(91,84,232,.1);
    opacity:0; transform:translateY(-8px) scale(.98); transform-origin:top center;
    transition:opacity .22s, transform .22s; pointer-events:none;
  }
  #bubble::after { content:""; position:absolute; right:38px; bottom:-7px; width:14px; height:14px;
    background:var(--surface); transform:rotate(45deg); }
  #bubble.show { opacity:1; transform:none; }

  /* ===== 範例提示清單 ===== */
  #suggestions {
    position:absolute; left:10px; right:10px; bottom:104px;
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:auto;
  }
  #suggestions .sg-label {
    width:100%; text-align:center; font-size:11px; font-weight:600; color:#fff; letter-spacing:.3px;
    text-shadow:0 1px 4px rgba(0,0,0,.55); margin-bottom:2px;
  }
  .sugg {
    appearance:none; cursor:pointer; white-space:nowrap;
    background:rgba(255,255,255,.92); color:var(--brand); border:1px solid rgba(91,84,232,.22);
    border-radius:999px; font-size:12px; font-weight:600; padding:6px 12px;
    box-shadow:0 3px 10px rgba(0,0,0,.16); transition:transform .12s, background .15s;
  }
  .sugg:hover { background:#fff; transform:translateY(-1px); }
  .sugg:active { transform:scale(.96); }
  .sugg:focus-visible { outline:2px solid #fff; outline-offset:2px; }

  /* ===== 本次工作階段的聊天紀錄 ===== */
  #history-panel {
    position:absolute; inset:10px 10px 104px; z-index:4;
    display:none; flex-direction:column; overflow:hidden; border-radius:18px;
    background:rgba(250,250,255,.98); color:var(--ink);
    box-shadow:0 16px 45px rgba(13,16,35,.3), inset 0 0 0 1px rgba(91,84,232,.12);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  }
  #history-panel.open { display:flex; }
  .history-head { min-height:48px; display:flex; align-items:center; gap:8px; padding:8px 10px 8px 14px; border-bottom:1px solid #e7e7f1; }
  .history-title { flex:1; font-size:14px; font-weight:800; }
  .history-note { display:block; color:#74758a; font-size:10px; font-weight:500; }
  .history-action { appearance:none; border:0; border-radius:9px; cursor:pointer; background:#eeeeF8; color:#4b4b62; min-height:30px; padding:0 9px; font-size:12px; font-weight:700; }
  .history-action:hover { background:#e2e1f6; }
  .history-action:focus-visible { outline:2px solid var(--brand); outline-offset:1px; }
  #history-list { flex:1; overflow:auto; padding:12px; overscroll-behavior:contain; scrollbar-width:thin; }
  .history-empty { margin:35% auto 0; max-width:210px; color:#74758a; text-align:center; font-size:13px; line-height:1.55; }
  .history-item { display:flex; flex-direction:column; align-items:flex-start; margin:0 0 10px; }
  .history-item.user { align-items:flex-end; }
  .history-message { max-width:88%; border-radius:14px 14px 14px 4px; padding:9px 11px; background:#fff; box-shadow:0 2px 8px rgba(28,29,55,.08); font-size:13px; line-height:1.5; white-space:pre-wrap; overflow-wrap:anywhere; }
  .history-item.user .history-message { border-radius:14px 14px 4px 14px; background:var(--brand); color:#fff; }
  .history-tools { display:flex; gap:4px; margin-top:4px; }
  .history-tool { appearance:none; border:0; background:transparent; color:#696a7d; padding:3px 6px; border-radius:6px; cursor:pointer; font-size:11px; }
  .history-tool:hover { background:#eaeaf3; color:var(--brand); }
  .history-confirm { margin-top:7px; display:flex; gap:6px; }
  .history-confirm button { appearance:none; border:0; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:11px; font-weight:700; }
  .history-confirm .confirm { background:var(--brand); color:#fff; }
  .history-confirm .cancel { background:#ececf4; color:#55566c; }

  #direct-warn {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#f4f6f8; color:#556; font-size:15px; text-align:center; padding:24px;
  }
  @media (max-width:330px) {
    #control-bar { bottom:6px; width:calc(100% - 12px); padding:5px; gap:4px; }
    .dock-row { gap:4px; }
    .ctrl { min-width:34px; height:34px; padding:0 7px; font-size:12.5px; }
    .ctrl.primary { padding:0 9px; }
    #type-input { height:34px; padding:0 9px; }
    #suggestions { left:6px; right:6px; bottom:94px; gap:4px; }
    .sugg { font-size:11.5px; padding:5px 9px; }
    #history-panel { inset:6px 6px 94px; }
  }
  @media (prefers-reduced-motion:reduce) {
    *, *::before, *::after { animation-duration:.01ms!important; animation-iteration-count:1!important; transition-duration:.01ms!important; }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble" role="status" aria-live="polite" aria-atomic="true"></div>
    <div id="suggestions"></div>
    <section id="history-panel" aria-label="聊天紀錄" aria-hidden="true">
      <div class="history-head">
        <div class="history-title">聊天紀錄<span class="history-note">只保留在這次開啟期間</span></div>
        <button class="history-action" id="btn-history-clear" type="button">清除</button>
        <button class="history-action" id="btn-history-close" type="button" aria-label="關閉聊天紀錄">✕</button>
      </div>
      <div id="history-list" role="log" aria-live="polite"></div>
    </section>
    <div id="control-bar">
      <div id="voice-live" role="status" aria-live="polite"><span class="voice-dot" aria-hidden="true"></span><span id="voice-status">即時語音待命</span><span class="voice-meter" aria-hidden="true"><i id="voice-level"></i></span></div>
      <div class="dock-row">
        <input id="type-input" type="text" maxlength="200" placeholder="打字問我也可以…" aria-label="輸入文字問題" />
        <button class="ctrl primary" id="btn-send" aria-label="送出文字問題"><span aria-hidden="true">➤</span></button>
      </div>
      <div class="dock-row" role="toolbar" aria-label="虛擬人控制列">
      <button class="ctrl primary" id="btn-mic" aria-label="開始即時語音對話" aria-pressed="false"><span aria-hidden="true">🎙️</span> 即時</button>
      <button class="ctrl" id="btn-engine" aria-label="切換 2D / 3D 角色" style="display:none">2D／3D</button>
      <button class="ctrl" id="btn-llm"   aria-label="啟用瀏覽器內 AI 大腦（首次需下載模型）" aria-pressed="false"><span aria-hidden="true">🧠</span></button>
      <button class="ctrl" id="btn-mute"  aria-label="靜音" aria-pressed="false"><span aria-hidden="true">🔊</span></button>
      <button class="ctrl" id="btn-speed" aria-label="調整語速">1.0×</button>
      <button class="ctrl" id="btn-lang" aria-label="切換對話語言">中</button>
      <button class="ctrl" id="btn-history" aria-label="開啟聊天紀錄" aria-expanded="false"><span aria-hidden="true">☰</span></button>
      <button class="ctrl" id="btn-close" aria-label="收起助理"><span aria-hidden="true">✕</span></button>
      </div>
    </div>
  </div>
  <div id="direct-warn">請透過 <code>embed.js</code> 載入此元件。</div>

  <!-- 3D(VRM) 引擎用的 importmap：宣告在這「不會」下載，等真的 import('three') 才抓 → lazy。
       2D(Live2D) 的 pixi/live2d 改成 bootAvatar() 裡用到才動態載入。 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.4/lib/three-vrm.module.min.js",
      "@pixiv/three-vrm-animation": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm-animation@3.5.4/lib/three-vrm-animation.module.min.js"
    }
  }
  </script>
  <script src="knowledge.js"></script>

  <!-- M4b：WebLLM（瀏覽器內跑小模型，零金鑰）。函式庫改成「按下🧠才動態 import」，
       一般訪客（不啟用大腦）不會下載這包 JS。控制權掛到 window.LLM。 -->
  <script type="module">
    const LLM_MODEL = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC"; // 中文不錯、約 1.1GB、首次下載後會被快取
    let engine = null, loadingPromise = null;
    window.LLM = {
      supported: ('gpu' in navigator),
      state: 'idle',        // idle | loading | ready | error
      progress: 0,
      model: LLM_MODEL,
      async load(onProgress) {
        if (engine) return engine;
        if (loadingPromise) return loadingPromise;
        window.LLM.state = 'loading';
        loadingPromise = import("https://esm.run/@mlc-ai/web-llm@0.2.84")  // 固定版本；只有按下🧠才抓這包函式庫
          .then((webllm) => webllm.CreateMLCEngine(LLM_MODEL, {
            initProgressCallback: (p) => { window.LLM.progress = p.progress || 0; if (onProgress) onProgress(p); }
          }))
          .then((e) => { engine = e; window.LLM.state = 'ready'; return e; })
          .catch((err) => { window.LLM.state = 'error'; window.LLM.error = String(err); throw err; });
        return loadingPromise;
      },
      async chat(messages, onDelta) {
        if (!engine) return null;
        if (!onDelta) {
          const r = await engine.chat.completions.create({ messages, temperature: 0.4, max_tokens: 220 });
          return r && r.choices && r.choices[0] && r.choices[0].message.content;
        }
        // 串流：邊生成邊回吐 token（逐句開講用）——首句不用等整段生成完
        const stream = await engine.chat.completions.create({ messages, temperature: 0.4, max_tokens: 220, stream: true });
        let full = '';
        for await (const c of stream) {
          const d = c && c.choices && c.choices[0] && c.choices[0].delta && c.choices[0].delta.content;
          if (d) { full += d; onDelta(d, full); }
        }
        return full;
      }
    };
  </script>

  <script src="tool-router.js"></script>
  <script>
  // ===== 可設定（由 embed.js 透過 query 帶入）：皮=模型 / 肉的語音=後端 / 內容=知識庫 =====
  const CFG = new URLSearchParams(location.search);
  function validConfiguredSite(value) {
    value = String(value || '').trim().toLowerCase();
    return /^[a-z0-9][a-z0-9_-]{0,39}$/.test(value) ? value : '';
  }
  const SITE_ID = (function () {
    const explicit = validConfiguredSite(CFG.get('site'));
    if (explicit) return explicit;
    for (const key of ['knowledge', 'analytics', 'handoff']) {
      try {
        const site = validConfiguredSite(new URL(CFG.get(key) || '', location.href).searchParams.get('site'));
        if (site) return site;
      } catch (e) {}
    }
    return 'default';
  })();
  const SITE_KEY = /^avk_[A-Za-z0-9_-]{20,80}$/.test(CFG.get('sitekey') || '') ? CFG.get('sitekey') : '';
  function publicWriteHeaders(extra) {
    const headers = Object.assign({}, extra || {});
    if (SITE_KEY) headers['X-Avatar-Site-Key'] = SITE_KEY;
    return headers;
  }
  const BRAND_COLOR = /^#[0-9a-f]{6}$/i.test(CFG.get('brand') || '') ? CFG.get('brand') : '';
  if (BRAND_COLOR) {
    const rgb = BRAND_COLOR.slice(1).match(/../g).map((part) => parseInt(part, 16));
    const light = rgb.map((value) => Math.round(value + (255 - value) * 0.22).toString(16).padStart(2, '0')).join('');
    document.documentElement.style.setProperty('--brand', BRAND_COLOR);
    document.documentElement.style.setProperty('--brand-2', '#' + light);
  }
  const DEFAULT_2D_MODEL_URL = 'https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display@31317b37d5e22955a44d5b11f37f421e94a11269/test/assets/haru/haru_greeter_t03.model3.json';
  const MODEL_URL = CFG.get('model') || DEFAULT_2D_MODEL_URL;
  const FALLBACK_MODEL_URL = CFG.get('fallbackmodel') || DEFAULT_2D_MODEL_URL;
  const MODEL_ZOOM = (() => {
    const value = Number(CFG.get('zoom'));
    return Number.isFinite(value) ? Math.max(1, Math.min(value, 3)) : 1.9;
  })();
  const POINTER_LOOK = !/^(0|false|off|no)$/i.test((CFG.get('look') || '').trim());
  const TTS_ENDPOINT = CFG.get('api') || 'api/tts';   // 沒設→試同站相對路徑；抓不到→自動退回瀏覽器語音（純前端可用）
  const KNOWLEDGE_URL = CFG.get('knowledge') || '';
  const HANDOFF_ENDPOINT = (function () {
    if (!CFG.get('handoff')) return '';
    try {
      const url = new URL(CFG.get('handoff'), location.href);
      return url.origin === location.origin ? url.href : '';
    } catch (e) { return ''; }
  })();
  const knowledgeReady = KNOWLEDGE_URL
    ? fetch(KNOWLEDGE_URL)
        .then((r) => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
        .then((kb) => {
          if (!Array.isArray(kb)) throw new Error('knowledge must be an array');
          const valid = kb.filter((e) => e && typeof e.q === 'string' && typeof e.a === 'string')
            .map((e) => ({
              q: e.q, kw: typeof e.kw === 'string' ? e.kw : '', a: e.a,
              source: e.source && typeof e.source === 'object' ? {
                type: String(e.source.type || 'text').slice(0, 12),
                title: String(e.source.title || '').slice(0, 160),
                url: String(e.source.url || '').slice(0, 1200)
              } : null
            }));
          if (!valid.length) throw new Error('knowledge has no valid entries');
          window.KB = valid;
        })
        .catch((e) => { console.warn('自訂知識庫載入失敗，改用內建知識庫：', e && e.message); })
    : Promise.resolve();

  // 皮的引擎判斷：data-vrm 指向 .vrm → 走 3D(VRM)；否則 data-model(.model3.json) → 走 2D(Live2D)
  let VRM_URL = CFG.get('vrm') || (/\.vrm($|\?)/i.test(MODEL_URL) ? MODEL_URL : ''); // let：拖放自己的 VRM 時可換
  const ENGINE  = VRM_URL ? '3d' : '2d';
  // 切換用：embedder 兩個皮都給(data-model + data-vrm) → 長出 2D/3D 切換鈕。
  // 預設引擎：data-engine 優先；否則有明確 2D 皮就 2D、只有 3D 就 3D。
  const has2D = !!CFG.get('model');
  const has3D = !!VRM_URL;
  const startMode = CFG.get('engine') || (has2D ? '2d' : (has3D ? '3d' : '2d'));

  // ===== 兩種人格模式（data-mode）：assistant＝導覽助理（預設、原行為）；companion＝陪伴模式（記憶＋連續對話）=====
  const MODE = (CFG.get('mode') || '').toLowerCase() === 'companion' ? 'companion' : 'assistant';
  let currentLocale = /^(zh-TW|en-US|ja-JP|ko-KR)$/i.test(CFG.get('lang') || '') ? CFG.get('lang') : 'zh-TW';
  // 記憶（陪伴模式限定）：只存訪客自己瀏覽器的 localStorage，零後端、不上傳；說「忘記我」即清除
  const MEM = {
    key: 'avatar-widget-mem:' + SITE_ID,
    on: MODE === 'companion',
    data: { name: '', visits: 0, last: 0, history: [] },
    load() {
      if (!this.on) return;
      try {
        localStorage.removeItem('avatar-widget-mem');
        const j = JSON.parse(localStorage.getItem(this.key) || 'null');
        if (j && typeof j === 'object') this.data = Object.assign(this.data, j);
      } catch (e) {}
      this.data.visits = (this.data.visits || 0) + 1;
      this.save();
    },
    save() { if (!this.on) return; try { this.data.last = Date.now(); localStorage.setItem(this.key, JSON.stringify(this.data)); } catch (e) {} },
    addTurn(role, content) {
      if (!this.on || !content) return;
      this.data.history.push({ role, content: String(content).slice(0, 200) });
      if (this.data.history.length > 12) this.data.history.splice(0, this.data.history.length - 12); // 只留最近 6 輪
      this.save();
    },
    captureName(text) {
      if (!this.on) return;
      const m = /(?:我叫|我是|叫我)\s*([^\s，。、,.!！?？的]{1,10})/.exec(text || '');
      if (m && !/誰|什麼|不知|沒有/.test(m[1])) { this.data.name = m[1]; this.save(); }
    },
    wipe() { this.data = { name: '', visits: 1, last: 0, history: [] }; try { localStorage.removeItem(this.key); } catch (e) {} }
  };
  MEM.load();
  // 內容白標：knowledge.js 可設 window.KB_META = { name, welcome, greeting, fallback, suggestions:[], sgLabel }
  // 讓「開場白／打招呼／答不出來的兜底／提示鈕」跟著知識庫走，不用改引擎 → 同一顆引擎能當客服/修繕/導覽…
  const KBM = Object.assign({}, (typeof window !== 'undefined' && window.KB_META) ? window.KB_META : {});
  [['name', 'name'], ['welcome', 'welcome'], ['greeting', 'greeting'], ['fallback', 'fallback']].forEach(([queryKey, metaKey]) => {
    const value = (CFG.get(queryKey) || '').trim();
    if (value) KBM[metaKey] = value.slice(0, metaKey === 'fallback' ? 800 : 500);
  });
  if (CFG.get('suggestions')) {
    try {
      const suggestions = JSON.parse(CFG.get('suggestions'));
      if (Array.isArray(suggestions)) KBM.suggestions = suggestions.slice(0, 8).map((item) => String(item).trim().slice(0, 100)).filter(Boolean);
    } catch (error) { console.warn('提示問題設定格式無效。'); }
  }

        name:'human_handoff', label:'轉接真人客服', description:'建立站內客服案件並在這個對話接收回覆',
        keywords:['真人客服', '轉真人', '找客服', '人工客服', '專人服務'], requiresConfirmation:true
      });
    }

  }

  function routeHostTool(text) {
    return window.AvatarToolRouter ? window.AvatarToolRouter.route(HOST_TOOLS, text) : { match:null, ambiguous:[] };
  }

  var pendingToolInput = null;

  function parameterPrompt(tool, name, errorText) {
    const property = tool.inputSchema.properties[name] || {};
    const label = property.title || name;
    const choices = property.enum && property.enum.length ? '（可選：' + property.enum.join('、') + '）' : '';
    return (errorText ? errorText + '。' : '') + '執行「' + tool.label + '」前，請提供' + label + choices + '。';
  }

  function prepareTool(tool, query, routeMeta, existingArgs) {
    const extracted = window.AvatarToolRouter.extract(tool, query, PAGE_CONTEXT, existingArgs || {}, null, false);
    if (tool.name === 'lead_capture' && extracted.args.consent === false) {
      pendingToolInput = null;
      const message = '好的，不會送出或保存你的聯絡資料。';
      addChatMessage('assistant', message, { source:'tool' }); speak(message);
      emitEvent('tool_cancel', { name:tool.name, reason:'consent_declined' });
      return;
    }
    if (extracted.missing.length) {
      pendingToolInput = { tool:tool, query:query, routeMeta:routeMeta, args:extracted.args, missing:extracted.missing };
      const prompt = parameterPrompt(tool, extracted.missing[0], extracted.errors[0] || '');
      addChatMessage('assistant', prompt, { source:'tool' }); speak(prompt);
      emitEvent('tool_input_required', { name:tool.name, field:extracted.missing[0] });

  function continueToolInput(text) {

    if (extracted.missing.length) {

  function offerToolChoices(query, candidates) {

  }

  function continueToolChoice(text) {

  function chooseTool(messageId, index) {

    const selected = item.pendingChoices[index]; item.pendingChoices = null; item.text = '已選擇「' + selected.tool.label + '」。'; pendingToolChoice = null; renderHistory();

  }

  function offerHostTool(tool, query, routeMeta, args) {

  function executePendingTool(messageId) {
    const item = chatLog.find((m) => m.id === messageId);

  function cancelPendingTool(messageId) {

  function continueToolConfirmation(text) {
    if (!pendingToolConfirmation) return false;

    if (/^(確認|確定|執行|可以|好|好的|yes|ok)$/i.test(answer)) { executePendingTool(pendingToolConfirmation); return true; }
    if (/^(取消|不要|算了|否|no|cancel)$/i.test(answer)) { cancelPendingTool(pendingToolConfirmation); return true; }

  }

  function handleToolResult(d) {

    } catch (e) {}

  }

  async function createSupportCase(pending, messageId) {
    updateChatMessage(messageId, '正在建立真人客服案件…', true);
    try {
      const response = await fetch(HANDOFF_ENDPOINT, {
        method:'POST', headers:publicWriteHeaders({ 'Content-Type':'application/json' }),
        body:JSON.stringify({ action:'create', siteId:handoffSiteId(), sessionId:ANALYTICS_SESSION, subject:pending.input.query, history:pending.input.history })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || ('HTTP ' + response.status));
      activeHandoff = { caseId:result.caseId, accessToken:result.accessToken, status:result.status || 'open' };
      handoffSeen = new Set(Array.isArray(result.messageIds) ? result.messageIds.map(String) : []);
      handoffInitialised = handoffSeen.size > 0; saveHandoff();
      updateChatMessage(messageId, '已建立真人客服案件 ' + result.caseId.slice(0, 8) + '，你可以繼續在這裡留言。', false);
      trackAnalytics('handoff', { question:pending.input.query, answerSource:'human_handoff' });
      pollHandoff();
      if (convoOn) { setVoiceStatus('真人客服對話中，請繼續留言…', 'listening', 0); setTimeout(startListening, 150); }
    } catch (error) {
      updateChatMessage(messageId, '真人客服建立失敗：' + error.message, false);
      if (convoOn) setTimeout(startListening, 150);
    }
  }

  function applyHandoffState(state) {
    if (!state || !state.case || !activeHandoff) return;
    const previous = activeHandoff.status;
    activeHandoff.status = state.case.status; saveHandoff();
    const messages = Array.isArray(state.messages) ? state.messages : [];
    if (!handoffInitialised) {
      messages.forEach((item) => handoffSeen.add(String(item.id)));
      handoffInitialised = true;
    } else {
      messages.forEach((item) => {
        const id = String(item.id);
        if (handoffSeen.has(id)) return;
        handoffSeen.add(id);
        if (item.sender === 'agent') {
          addChatMessage('assistant', '真人客服：' + item.body, { source:'human' });
          if (!listening) speak(item.body); else showBubble('真人客服：' + item.body);
        }

    if (previous !== 'resolved' && activeHandoff.status === 'resolved') addChatMessage('assistant', '真人客服已將這個案件結案；你仍可以繼續詢問虛擬人。', { source:'human' });
  }

  async function pollHandoff() {
    clearTimeout(handoffTimer);
    if (!HANDOFF_ENDPOINT || !activeHandoff) return;
    try {
      const url = new URL(HANDOFF_ENDPOINT); url.searchParams.set('caseId', activeHandoff.caseId);
      const response = await fetch(url.href, { headers:publicWriteHeaders({ Authorization:'Bearer ' + activeHandoff.accessToken }), cache:'no-store' });
      if (response.status === 404 || response.status === 401) { activeHandoff = null; saveHandoff(); return; }
      if (response.ok) applyHandoffState(await response.json());
    } catch (e) {}
    if (activeHandoff && activeHandoff.status !== 'resolved') handoffTimer = setTimeout(pollHandoff, 5000);
  }

  async function sendVisitorHandoff(text) {
    try {
      const response = await fetch(HANDOFF_ENDPOINT, {
        method:'POST', headers:publicWriteHeaders({ 'Content-Type':'application/json', Authorization:'Bearer ' + activeHandoff.accessToken }),
        body:JSON.stringify({ action:'message', caseId:activeHandoff.caseId, body:text })
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(result.error || ('HTTP ' + response.status));
      applyHandoffState(result); pollHandoff();
    } catch (error) { addChatMessage('assistant', '訊息傳送失敗：' + error.message, { source:'human' }); }
    finally { if (convoOn) setTimeout(() => { if (convoOn && !listening && !isSpeaking) startListening(); }, 180); }
  }

  (function restoreHandoff() {
    if (!HANDOFF_ENDPOINT) return;
    try {
      sessionStorage.removeItem('avatar-widget-handoff');
      const stored = JSON.parse(sessionStorage.getItem('avatar-widget-handoff:' + handoffSiteId()) || 'null');
      if (stored && stored.caseId && stored.accessToken) { activeHandoff = stored; pollHandoff(); }
    } catch (e) {}
  })();

  window.addEventListener('message', (e) => {
    if (e.source !== window.parent) return;
    if (PARENT_ORIGIN !== '*' && e.origin !== PARENT_ORIGIN) return;
    const d = e.data || {};
    if (d.ns !== 'avatar-widget-host') return;
    if (d.type === 'say') {
      const text = String(d.text || '').slice(0, 600); addChatMessage('assistant', text, { source: 'host' }); speak(text);
    }
    if (d.type === 'ask') handleUser(String(d.text || '').slice(0, 200));   // 父頁代問（例：landing 點卡片 → 小修回答）
    if (d.type === 'visibility') setRendererVisible(d.visible !== false);
    if (d.type === 'context') { PAGE_CONTEXT = safeContext(d.context); emitEvent('context_updated', { keys: Object.keys(PAGE_CONTEXT) }); }
    if (d.type === 'tools') HOST_TOOLS = toolsWithBuiltInHandoff(d.tools);
    if (d.type === 'tool-result') handleToolResult(d);
    if (d.type === 'locale') setLocale(d.locale);
    if (d.type === 'expression') setExternalExpression(d.name);
    // 注意：不接受用 postMessage 遠端啟動麥克風（listen），避免惡意父頁偷開麥；麥克風只由使用者點擊觸發
  });

  function showBubble(text) {
    const b = document.getElementById('bubble');
    b.textContent = text; b.classList.add('show');
    clearTimeout(showBubble._t);
    showBubble._t = setTimeout(() => b.classList.remove('show'), 6000);
  }

  // ===== TTS：開口說話 + 對嘴 =====
  function localeLabel(locale) { return /^en/i.test(locale) ? 'EN' : (/^ja/i.test(locale) ? '日' : (/^ko/i.test(locale) ? '한' : '中')); }
  function localeVoice(locale) { return /^en/i.test(locale) ? 'en-US-JennyNeural' : (/^ja/i.test(locale) ? 'ja-JP-NanamiNeural' : (/^ko/i.test(locale) ? 'ko-KR-SunHiNeural' : 'zh-TW-HsiaoChenNeural')); }
  function setLocale(locale) {
    const normal = String(locale || '').replace('_', '-');
    const matched = ['zh-TW', 'en-US', 'ja-JP', 'ko-KR'].find((x) => x.toLowerCase() === normal.toLowerCase());
    if (!matched) return;
    currentLocale = matched;
    if (!CFG.get('voice')) neuralVoice = localeVoice(matched);
    const btn = document.getElementById('btn-lang'); if (btn) btn.textContent = localeLabel(matched);
    if (recognition) recognition.lang = matched;
    loadVoice();
    emitEvent('locale_change', { locale: matched });
  }
  function setExternalExpression(name) {
    name = String(name || '').toLowerCase();
    if (!/^(neutral|happy|sad|surprised|thinking)$/.test(name)) return;
    if (name === 'thinking') {
      if (gesture3D) gesture3D('thinking');
      if (gesture2D) gesture2D('thinking');
    }
    else setEmotion(name);
    emitEvent('expression_change', { name });
  }
  function loadVoice() {
    const vs = speechSynthesis.getVoices();
    const pick = (re) => vs.find(v => re.test(v.name + ' ' + v.lang) && !/Google/i.test(v.name)); // 避開 Chrome 會靜默失敗的 Google 遠端語音
    const langPattern = new RegExp(currentLocale.replace('-', '[-_]'), 'i');
    const configuredVoice = CFG.get('voice') || neuralVoice || '';
    const prefersMale = /(YunJhe|Zhiwei|雲哲|云哲|志威|Male|男聲)/i.test(configuredVoice);
    const chineseMale = /^zh/i.test(currentLocale) && prefersMale
      ? pick(/(YunJhe|Zhiwei|雲哲|云哲|志威)/i)
        || pick(/Microsoft.*Male.*zh/i)
      : null;
    const chineseFallback = /^zh/i.test(currentLocale)
      ? pick(/(HsiaoChen|HsiaoYu|曉臻|曉雨).*zh/i)
        || pick(/(Yating|Zhiwei).*zh[-_]TW/i)
        || pick(/Microsoft.*zh[-_]TW/i)
        || pick(/zh[-_]TW/i)
        || pick(/^zh/i)
        || vs.find(v => /zh/i.test(v.lang))
      : null;
    ttVoice = chineseMale || pick(langPattern) || chineseFallback || null;
  }
  if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }

  // 中止目前正在講的（逐句佇列 + 神經語音音檔 + 瀏覽器 TTS + 對嘴），給「點第二下打斷第一下」用
  function stopSpeaking() {
    speakSeq++;                                            // 作廢所有在跑的逐句鏈（pump 看序號就會停）
    speechQ = []; speechEnded = true; speechPlaying = false;
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { clearTimeout(_browserChunkT); } catch (e) {}
    if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    for (const c of _ttsControllers) { try { c.abort(); } catch (e) {} }
    _ttsControllers.clear();
    isSpeaking = false; useAudioMouth = false; audioMouth = 0;
    setEmotion('neutral');
  }

  // 對外入口：整段文字 → 切句進逐句佇列（②講第 1 句時預抓第 2 句 → 長答案幾乎立刻開口）
  function speak(text, options) {
    showBubble(text);
    postToParent('speaking', { text });
    if (ttsMuted) { onUtteranceEnd(); return; }         // 靜音：沒語音可收尾，直接觸發對話迴圈 hook
    const sid = beginSpeech();
    setEmotionFromText(text);          // ①講話帶情緒（3D 表情；要在 beginSpeech 之後，不然被 reset）
    for (const s of splitSentences(text)) pushSpeech(sid, s, options);
    endSpeech(sid);
  }

  // ===== ②逐句開講引擎：一次一個 session；句子依序講，神經語音在背景先抓下一句 =====
  function beginSpeech() {
    stopSpeaking();                    // 打斷上一段（含清佇列、表情回中性）
    assistantSpeechStartedAt = performance.now();
    if (convoOn) setVoiceStatus('正在回答，可以直接插話…', 'speaking', 0);
    speechQ = []; speechEnded = false; speechPlaying = false; tapDone = false;
    return ++speakSeq;
  }
  function pushSpeech(sid, text, options) {
    if (sid !== speakSeq) return;
    const t = String(text || '').trim(); if (!t) return;
    speechQ.push({ text: t, prep: null, err: null, instant:!!(options && options.instant) });
    prefetchSpeech(sid);
    pumpSpeech(sid);
  }
  function endSpeech(sid) { if (sid === speakSeq) { speechEnded = true; pumpSpeech(sid); } }
  // 即時對話：回答講完後自動重開麥；回答期間由音量偵測支援插話打斷。
  var convoOn = false, noSpeechRuns = 0;
  function onUtteranceEnd() {
    handleUser._busy = false;
    if (convoOn) setVoiceStatus('準備繼續聆聽…', 'thinking', 0);
    if (convoOn) setTimeout(() => {
      if (convoOn && !listening && !isSpeaking && !speechPlaying) { noSpeechRuns = 0; startListening(); }
    }, 260);
  }
  function prefetchSpeech(sid) {       // 只預抓最前面 2 句（在途 ≤2），護後端限流
    if (sid !== speakSeq || neuralDisabled) return;
    for (const it of speechQ.slice(0, 2)) {
      if (it.prep || it.err) continue;
      if (it.text === tapGreetingText()) {
        const prep = prepareTapGreeting();
        if (!it.instant || tapGreetingBuffer) it.prep = prep.catch((e) => { it.err = e; return null; });
        else prep.catch(() => {}); // 暖機失敗仍由這次點擊的瀏覽器語音立即接手
      } else it.prep = fetchTTSBuffer(it.text).catch((e) => { it.err = e; return null; });
    }
  }
  async function pumpSpeech(sid) {
    if (speechPlaying || sid !== speakSeq) return;
    const item = speechQ.shift();
    if (!item) { if (speechEnded) { setEmotion('neutral'); onUtteranceEnd(); } return; }   // 整段講完 → 表情回中性＋(陪伴)重開麥
    speechPlaying = true;
    const done = () => {
      if (sid !== speakSeq) return;
      speechPlaying = false;
      prefetchSpeech(sid);
      pumpSpeech(sid);
    };
    // 點擊問候要立即有反應：預載尚未完成時先用瀏覽器語音，不等待遠端 TTS 2–3 秒。
    if (item.instant && item.text === tapGreetingText() && !tapGreetingBuffer) {
      prepareTapGreeting();
      speakBrowserChunk(item.text, sid, done);
      return;
    }
    let buf = null;
    if (!neuralDisabled && !item.err) {
      if (!item.prep) item.prep = fetchTTSBuffer(item.text).catch((e) => { item.err = e; return null; });
      buf = await item.prep;
    }
    if (sid !== speakSeq) return;      // 等音檔期間被新的說話打斷 → 整條放棄
    if (buf) { prefetchSpeech(sid); playBuffer(buf, done); }
    else {
      if (item.err) markNeuralFail(item.err);
      speakBrowserChunk(item.text, sid, done);
    }
  }
  function markNeuralFail(e) {
    const msg = (e && e.message) || '';
    if (/http 429/.test(msg)) { console.warn('TTS 被限流，這句退瀏覽器語音'); return; } // 429 是暫時的，別鎖死神經語音
    if (/http 4\d\d|Failed to fetch|NetworkError|Load failed/i.test(msg)) neuralDisabled = true; // 結構性失敗(無後端/CORS/被擋)→不再試
    console.warn('神經語音失敗，退回瀏覽器語音：', msg);
  }

  // edge-tts 神經語音：抓 /api/tts 的 MP3 → AudioBuffer（給佇列預抓用）
  async function fetchTTSBuffer(text, persistent) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 預載發生在使用者互動前，不能等待 autoplay 鎖住的 resume；音檔可先抓取與解碼，點擊時再恢復播放。
    if (audioCtx.state === 'suspended') { try { audioCtx.resume().catch(() => {}); } catch (e) {} }
    const controller = new AbortController();
    if (!persistent) _ttsControllers.add(controller);
    const timer = setTimeout(() => controller.abort(), 15000);
    try {
      const resp = await fetch(TTS_ENDPOINT, {

  // ===== 共用：每幀算出嘴巴開合 0..1（2D 寫 ParamMouthOpenY、3D 寫 aa 表情，共用同一套計算）=====
  function computeMouth() {
    if (isSpeaking && useAudioMouth) {

  // 注意：用 var 不用 let —— bootAvatar() 在腳本上方就被呼叫，let 會有 TDZ「used before init」錯
  function loadUMD() {
    if (_umd) return _umd;
    const urls = [
      'https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js',
      'https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js',
      'https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js'
    ];
    _umd = urls.reduce((p, u) => p.then(() => new Promise((res, rej) => {
      const s = document.createElement('script'); s.src = u; s.onload = res; s.onerror = rej; document.head.appendChild(s);
    })), Promise.resolve());

  }

  // ===== 引擎切換外殼：每個引擎建自己的 canvas、回傳 dispose；切換＝dispose 舊的再 boot 新的 =====
  function newCanvas() {
    const st = document.getElementById('stage');
    st.querySelectorAll('canvas.avatar-canvas').forEach((old) => old.remove()); // 切換時保證不留舊 canvas（殘骸）
    const c = document.createElement('canvas'); c.className = 'avatar-canvas';

  }
  function setRendererVisible(visible) {
    _widgetVisible = !!visible;

    if (!_widgetVisible) {
      stopSpeaking();
      if (convoOn) stopVoiceSession('即時語音已因收起視窗而停止。');
    }
  }

  async function setEngine(mode, allowFallback) {
    if (_switching || mode === _engineMode) return;
    _switching = true;
    if (_renderer) { try { _renderer.dispose(); } catch (e) {} _renderer = null; }
    const eb = document.getElementById('btn-engine');
    if (eb) { eb.disabled = true; eb.textContent = (mode === '3d') ? '3D…' : '2D…'; }
    try {
      const next = (mode === '3d') ? await bootVRM() : await bootAvatar();
      if (!next) throw new Error(mode.toUpperCase() + ' renderer unavailable');
      _renderer = next;
      _engineMode = mode;
      if (_renderer.setPaused) _renderer.setPaused(!_widgetVisible);
      if (eb) eb.textContent = (mode === '3d') ? '3D' : '2D';
    } catch (e) {
      console.error(e);
      _engineMode = null;
      const fallback = mode === '3d' ? '2d' : '3d';
      const canFallback = mode === '3d' ? has2D : has3D;
      if (allowFallback !== false && canFallback) {
        showBubble(mode.toUpperCase() + ' 角色載入失敗，已切回可用角色。');
        _switching = false;
        if (eb) eb.disabled = false;
        return await setEngine(fallback, false);
      }
      showBubble('角色載入失敗，請稍後再試。');
      postToParent('error', { message: e && e.message || String(e) });
    } finally {
      _switching = false;
      if (eb) eb.disabled = false;
    }
  }
  function initEngines() {
    setEngine(startMode);
    if (has2D && has3D) {  // 兩個皮都給 → 顯示切換鈕，讓使用者即時切
      const eb = document.getElementById('btn-engine');
      if (eb) { eb.style.display = ''; eb.onclick = () => setEngine(_engineMode === '3d' ? '2d' : '3d'); }
    }
  }

  // ===== 拖放自己的 VRM：把 .vrm 拖到角色上就直接換成你的 3D 角色（零改 code）=====
  function loadVRMFile(file) {
    if (!file || !/\.vrm$/i.test(file.name)) { showBubble('請拖一個 .vrm 檔喔'); return; }
    try { if (VRM_URL && VRM_URL.indexOf('blob:') === 0) URL.revokeObjectURL(VRM_URL); } catch (e) {}
    VRM_URL = URL.createObjectURL(file);
    const eb = document.getElementById('btn-engine');          // 換上後也顯示 2D/3D 切換鈕
    if (eb) { eb.style.display = ''; if (!eb.onclick) eb.onclick = () => setEngine(_engineMode === '3d' ? '2d' : '3d'); }
    _engineMode = null;                                         // 強制重 boot（即使已在 3D）
    setEngine('3d');
    showBubble('換上你的角色了！🎭');
  }
  ['dragenter', 'dragover'].forEach((ev) => document.addEventListener(ev, (e) => { e.preventDefault(); }));
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) loadVRMFile(f);
  });

      const GESTURES = {        // 情境手勢 + 待機變化（body-only，不碰嘴）
        wave: TK + 'Goodbye.vrma',
        bow: 'https://cdn.jsdelivr.net/gh/hirokazuniimoto/virtual-avatar-sdk@114d4336e0ac36bf9c2297b0a93ad7604b13704b/assets/animations/quick_formal_bow.vrma',

        surprised: TK + 'Surprised.vrma'  // ①情緒用：驚訝的小反應（不在點擊問候清單裡）
      };

      r3.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const onMove = (ev) => { const r = stage.getBoundingClientRect(); if (!r.width) return; mx = Math.max(-1, Math.min(1, ((ev.clientX - r.left) / r.width) * 2 - 1)); my = Math.max(-1, Math.min(1, ((ev.clientY - r.top) / r.height) * 2 - 1)); };

      (async () => {
        const bodyOnly = (cl) => { cl.tracks = cl.tracks.filter((tr) => /\.quaternion$/.test(tr.name)); return cl; }; // 只留骨架旋轉、剝臉部表情與位移

          });

          if (gestureActions.wave) setTimeout(() => playGesture('wave'), 800);    // 出場招呼

            if (!waving && !isSpeaking && Math.random() < 0.65) playGesture(Math.random() < 0.5 ? 'look' : 'relax');
          }, 15000);
        } catch (e) { console.warn('VRMA 手勢庫載入失敗：', e && e.message); }
      })();
      setTimeout(() => showBubble(welcomeText()), 700);
      postToParent('ready');

          if (blinkT < 0) { nextBlink -= dt; if (nextBlink <= 0) { blinkT = 0; nextBlink = 2 + Math.random() * 4; } }
          else { blinkT += dt / BLINK; em && em.setValue('blink', Math.sin(Math.min(blinkT, 1) * Math.PI)); if (blinkT >= 1) { blinkT = -1; em && em.setValue('blink', 0); } }

              hdY += Math.sin(ts * 0.55) * 0.05;                  // 轉頭

        dispose() {

    }
  }

  // ===== 2D 皮：Live2D 載入 + 對嘴 =====
  async function bootAvatar() {
    try {
      await loadUMD();                       // 用到才載 pixi + live2d
      const Live2DModel = PIXI.live2d.Live2DModel;
      try { Live2DModel.registerTicker(PIXI.Ticker); } catch (e) {}

      const canvas = newCanvas();
      app = new PIXI.Application({
        view: canvas,
        autoStart: true, backgroundAlpha: 0, antialias: true,
        resizeTo: document.getElementById('stage'),
      });

      try {
        model = await Live2DModel.from(MODEL_URL, { autoInteract: POINTER_LOOK });
      } catch (primaryError) {
        if (!FALLBACK_MODEL_URL || FALLBACK_MODEL_URL === MODEL_URL) throw primaryError;
        console.warn('自訂角色載入失敗，改用範例角色：', primaryError && primaryError.message);
        showBubble('自訂角色暫時無法載入，已切換為範例角色。');
        postToParent('model_fallback', { from:MODEL_URL, to:FALLBACK_MODEL_URL });
        model = await Live2DModel.from(FALLBACK_MODEL_URL, { autoInteract: POINTER_LOOK });
      }
      app.stage.addChild(model);
      model.anchor.set(0.5, 1.0);

      // 關掉 Live2D 模型自帶的（日文）動作語音 — 只保留我們自己的 TTS（兩者來源不同，互不影響）
      try { if (PIXI.live2d.SoundManager) PIXI.live2d.SoundManager.volume = 0; } catch (e) {}
      try {
        const ms = (model.internalModel.settings && model.internalModel.settings.motions) || {};
        for (const g of Object.keys(ms)) (ms[g] || []).forEach(d => { delete d.Sound; delete d.sound; });
      } catch (e) {}

      // 取景：'half'=近距離半身（頭+上半身，腿裁掉，聊天頭像感）；'full'=全身。可用 ?fit=full / data-fit 切回
      const FIT_MODE = CFG.get('fit') || 'half';
      function fit() {
        const w = app.renderer.width, h = app.renderer.height;
        const nativeH = (model.internalModel && model.internalModel.height) || 1000;
        if (FIT_MODE === 'half') {
          const s = (h / nativeH) * 0.95 * MODEL_ZOOM;      // data-zoom 越大越近（安全範圍 1–3）
          model.scale.set(s);
          model.x = w / 2;
          model.y = nativeH * s + h * 0.04;                 // 腳推到畫面外、頭留 4% 上緣
        } else {
          model.scale.set((h / nativeH) * 0.95);

      const internal = model.internalModel;
      const core = internal.coreModel;
      const lipMaximums = lipIds.map((id) => {
        try {
          const index = core.getParameterIndex(id);
          return Math.max(1, Math.min(3, core.getParameterMaximumValue(index) || 1));
        } catch (e) { return 1; }
      });
      const reduceAutoMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
      const motionState = {
        tapAt:0, thinking:false, thinkingMix:0, emotion:'neutral', emotionUntil:0,
        autoName:'', autoStart:0, autoDuration:0, autoDirection:1, autoIndex:0,
        nextAutoAt:performance.now() + 900
      };
      const autoActions = ['look', 'sing', 'nod', 'drum', 'tilt', 'wave'];
      const parameterCache = new Map();
      const parameterRange = (id) => {
        if (parameterCache.has(id)) return parameterCache.get(id);
        try {
          const index = core.getParameterIndex(id);

            min:Number(core.getParameterMinimumValue(index)),
            max:Number(core.getParameterMaximumValue(index))

          if (!Number.isFinite(range.min) || !Number.isFinite(range.max)) throw new Error('parameter unavailable');
          parameterCache.set(id, range);

        } catch (e) {

        }

      };

        const range = parameterRange(id);

        try { core.setParameterValueById(id, value); } catch (e) {}

      const applyProceduralMotion = () => {
        const now = performance.now();

        if (!reduceAutoMotion) {

          addNormalized('ParamAngleX', envelope * 0.08);
          addNormalized('ParamBodyAngleZ', envelope * 0.075);
          addNormalized('ParamShoulder', envelope * 0.12);
          addNormalized('ParamArmShake', Math.sin(tapProgress * Math.PI * 2) * envelope * 0.34);
          addNormalized('ParamArmShake2', Math.sin(tapProgress * Math.PI * 2 + 0.6) * envelope * 0.28);
        }

        // 自動待機動作：固定輪播，確保明顯的唱歌／打鼓姿勢一定會出現。
        const autoAllowed = !reduceAutoMotion && _widgetVisible && !isSpeaking && !speechPlaying
          && !motionState.thinking && tapProgress >= 1;
        if (!autoAllowed && motionState.autoName) {
          motionState.autoName = '';
          motionState.nextAutoAt = now + 1800;
        } else if (autoAllowed && !motionState.autoName && now >= motionState.nextAutoAt) {
          motionState.autoName = autoActions[motionState.autoIndex % autoActions.length];
          motionState.autoIndex++;
          motionState.autoStart = now;
          motionState.autoDuration = /^(sing|drum|wave)$/.test(motionState.autoName) ? 2200 : 1650;
          motionState.autoDirection = Math.random() < 0.5 ? -1 : 1;
        }
        if (motionState.autoName !== 'sing') setNormalized('ParamHandCooking', 0);
        if (motionState.autoName !== 'drum') setNormalized('ParamCoat', 0);
        if (autoAllowed && motionState.autoName) {
          const progress = (now - motionState.autoStart) / motionState.autoDuration;
          if (progress >= 1) {
            setNormalized('ParamHandCooking', 0);
            setNormalized('ParamCoat', 0);
            motionState.autoName = '';
            motionState.nextAutoAt = now + 1600 + Math.random() * 1200;
          } else {
            const envelope = Math.sin(Math.PI * Math.max(0, progress));
            const direction = motionState.autoDirection;
            if (motionState.autoName === 'look') {
              addNormalized('ParamAngleX', envelope * direction * 0.26);
              addNormalized('ParamEyeBallX', envelope * direction * 0.58);
              addNormalized('ParamBodyAngleY', envelope * direction * 0.1);
            } else if (motionState.autoName === 'sing') {
              setNormalized('ParamHandCooking', envelope * 0.98);
              addNormalized('ParamBodyAngleZ', Math.sin(progress * Math.PI * 4) * envelope * 0.1);
              addNormalized('ParamAngleZ', Math.sin(progress * Math.PI * 4 + 0.5) * envelope * 0.08);
              addNormalized('ParamShoulder', envelope * 0.16);
              if (!isSpeaking) addNormalized('ParamMouthOpenY', Math.abs(Math.sin(progress * Math.PI * 6)) * envelope * 0.24);
            } else if (motionState.autoName === 'nod') {
              const nod = Math.sin(progress * Math.PI * 2) * envelope;
              addNormalized('ParamAngleY', nod * 0.23);
              addNormalized('ParamBodyAngleX', nod * 0.085);
            } else if (motionState.autoName === 'drum') {
              const beat = Math.sin(progress * Math.PI * 8) * envelope;
              setNormalized('ParamCoat', envelope * 0.98);
              addNormalized('ParamArmShake', beat * 0.58);
              addNormalized('ParamArmShake2', -beat * 0.52);
              addNormalized('ParamBodyAngleX', Math.abs(beat) * 0.08);
            } else if (motionState.autoName === 'tilt') {
              addNormalized('ParamAngleZ', envelope * direction * 0.24);
              addNormalized('ParamBodyAngleZ', envelope * direction * 0.1);
              addNormalized('ParamShoulder', envelope * 0.12);
            } else if (motionState.autoName === 'wave') {
              const wave = Math.sin(progress * Math.PI * 5) * envelope;
              addNormalized('ParamArmShake', wave * 0.64);
              addNormalized('ParamArmShake2', Math.sin(progress * Math.PI * 5 + 0.7) * envelope * 0.54);
              addNormalized('ParamShoulder', envelope * 0.2);
              addNormalized('ParamAngleZ', envelope * direction * 0.09);
            }
          }
        }

        // 思考：使用偏頭與視線；原模型的 ParamHandThinking 實際是手套切換，不能誤當思考手勢。
        motionState.thinkingMix += ((motionState.thinking ? 1 : 0) - motionState.thinkingMix) * 0.08;
        if (motionState.thinkingMix > 0.002) {
          const mix = motionState.thinkingMix;
          addNormalized('ParamAngleZ', -mix * 0.09);
          addNormalized('ParamAngleY', mix * 0.055);
          addNormalized('ParamEyeBallY', mix * 0.08);
        }

        if (motionState.emotionUntil && now > motionState.emotionUntil) {
          motionState.emotion = 'neutral';
          motionState.emotionUntil = 0;
        }
        if (motionState.emotion === 'happy') {
          addNormalized('ParamEyeSmile', 0.52);
          addNormalized('ParamEyeSmileR', 0.52);
          addNormalized('ParamMouthForm', 0.24);
        } else if (motionState.emotion === 'surprised') {
          addNormalized('ParamBrowLYY', 0.26);
          addNormalized('ParamBrowRYY', 0.26);
          if (!isSpeaking) addNormalized('ParamMouthOpenY', 0.22);
        } else if (motionState.emotion === 'sad') {
          addNormalized('ParamBrowLForm', -0.18);
          addNormalized('ParamBrowRForm2', -0.18);
          addNormalized('ParamMouthForm', -0.16);
        }
      };
      const applyLipSync = () => {
        const m = computeMouth();                                  // 共用嘴型計算（與 3D 同一套）
        lipIds.forEach((id, index) => {
          try { core.setParameterValueById(id, m * lipMaximums[index]); } catch (e) {}
        });
      };
      if (internal && typeof internal.on === 'function') internal.on('beforeModelUpdate', applyProceduralMotion);
      if (internal && typeof internal.on === 'function') internal.on('beforeModelUpdate', applyLipSync);

      model.on('hit', () => onTap());
      canvas.addEventListener('pointerdown', onTap);

      setTimeout(() => showBubble(welcomeText()), 700);
      postToParent('ready');
      window.__avatarModel = model;

      return {
        setPaused(value) {
          if (!app) return;
          if (value) app.stop(); else app.start();
        },
        dispose() {
        try { if (internal && typeof internal.off === 'function') internal.off('beforeModelUpdate', applyProceduralMotion); }
        catch (e) {}
        try { if (internal && typeof internal.off === 'function') internal.off('beforeModelUpdate', applyLipSync); }
        catch (e) {}
        if (gesture2D === control2D) gesture2D = null;
        try { window.removeEventListener('resize', fit); } catch (e) {}
        try { app && app.destroy(true, { children: true, texture: true, baseTexture: true }); } catch (e) {}
        app = null; model = null; canvas.remove();
      } };
    } catch (err) {
      console.error(err);
      throw err;
    }
  }

  function onTap() {
    if (onTap._lock) return;                 // 去抖：hit 事件與 pointerdown 可能同時觸發
    onTap._lock = true;
    setTimeout(() => { onTap._lock = false; }, 400);
    if (audioCtx && audioCtx.state === 'suspended') { try { audioCtx.resume().catch(() => {}); } catch (e) {} }
    if (gesture2D) gesture2D('tap');
    if (model) try { model.motion('Tap'); } catch (e) {}
    speak(tapGreetingText(), { instant:true });
  }

  // ===== 控制列 =====
  document.getElementById('btn-close').onclick = () => postToParent('close');
  document.getElementById('btn-history').onclick = () => setHistoryOpen(!document.getElementById('history-panel').classList.contains('open'));
  document.getElementById('btn-history-close').onclick = () => setHistoryOpen(false);
  document.getElementById('btn-history-clear').onclick = () => {
    chatLog.length = 0; renderHistory(); showBubble('已清除這次的聊天紀錄'); emitEvent('history_clear');
  };
  document.getElementById('btn-lang').onclick = () => {
    const locales = ['zh-TW', 'en-US', 'ja-JP', 'ko-KR'];
    setLocale(locales[(locales.indexOf(currentLocale) + 1) % locales.length]);
    showBubble(currentLocale === 'en-US' ? 'Language: English' : (currentLocale === 'ja-JP' ? '言語：日本語' : (currentLocale === 'ko-KR' ? '언어: 한국어' : '語言：繁體中文')));
  };
  setLocale(currentLocale);

  // 範例提示清單：一進站就告訴使用者「可以說什麼」，點任一項＝直接問（語音/打字都不用先猜）
  (function renderSuggestions() {
    const box = document.getElementById('suggestions');
    if (!box) return;
    const SUGGESTIONS = MODE === 'companion'
      ? ['今天過得好嗎？', '跟我聊聊天', '說個笑話', '你會記得我嗎？']
      : (Array.isArray(KBM.suggestions) && KBM.suggestions.length ? KBM.suggestions
        : ['怎麼安裝？', '怎麼換成我的角色？', '要不要錢？', '麥克風怎麼用？', '我可以說什麼？']);
    const label = document.createElement('div'); label.className = 'sg-label';
    label.textContent = MODE === 'companion' ? '💬 可以跟我聊：' : (KBM.sgLabel || '💬 你可以問我：');
    box.appendChild(label);
    SUGGESTIONS.forEach((s) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'sugg'; b.textContent = s;
      b.onclick = () => handleUser(s.replace(/？$/, ''));
      box.appendChild(b);
    });
  })();
  // 打字輸入：Enter 或 ➤ 送出。組字中（注音/拼音選字）按的 Enter 不送，避免誤發半成品
  (function bindTyping() {
    const ti = document.getElementById('type-input');
    const send = () => { const t = ti.value.trim(); if (!t) return; ti.value = ''; handleUser(t); };
    document.getElementById('btn-send').onclick = send;
    ti.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); send(); }
    });
  })();
  document.getElementById('btn-mic').onclick = () => {
    if (convoOn) stopVoiceSession('即時語音對話已結束。');
    else startVoiceSession();
  };
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && convoOn) stopVoiceSession('頁面進入背景，即時語音已停止。');
  });
  setMic(false);
  document.getElementById('btn-mute').onclick  = () => {
    ttsMuted = !ttsMuted;
    const mb = document.getElementById('btn-mute');
    mb.textContent = ttsMuted ? '🔇' : '🔊';
    mb.setAttribute('aria-pressed', String(ttsMuted));
    if (ttsMuted) {
      stopSpeaking(); // 立刻停掉正在播的（神經語音 + 瀏覽器語音）
      if (convoOn) setTimeout(() => { if (convoOn && !listening) startListening(); }, 120);
    }
    showBubble(ttsMuted ? '已靜音' : '已開啟語音');
  };
  document.getElementById('btn-speed').onclick = () => {
    const steps = [0.9, 1.0, 1.2, 1.4];
    ttsRate = steps[(steps.indexOf(ttsRate) + 1) % steps.length] || 1.0;
    document.getElementById('btn-speed').textContent = ttsRate.toFixed(1) + '×';
    showBubble('語速：' + ttsRate.toFixed(1) + '×');
  };
  document.getElementById('btn-llm').onclick = async () => {
    const btn = document.getElementById('btn-llm');
    // 啟用本機 Ollama 模式時：🧠 用來顯示狀態 / 重新連線，不下載 WebLLM
    if (window.OLLAMA && window.OLLAMA.enabled) {
      const ok = window.OLLAMA.ready || await window.OLLAMA.ping();
      btn.textContent = ok ? '🧠本機' : '🧠✗'; btn.classList.toggle('llm-on', ok);
      btn.setAttribute('aria-pressed', String(ok));
      showBubble(ok ? ('本機 AI 大腦運作中（' + window.OLLAMA.model + '）🧠') : '本機 Ollama 連不上：確認 Ollama 在跑、且 OLLAMA_ORIGINS 已允許這個網站。');
      return;
    }
    if (!window.LLM || !window.LLM.supported) { showBubble('這個裝置不支援 WebGPU，先用知識庫模式就好（功能一樣可用）。'); return; }
    if (window.LLM.state === 'ready')   { showBubble('AI 大腦已啟用，問我問題吧 🧠'); return; }
    if (window.LLM.state === 'loading') { showBubble('AI 大腦載入中… ' + Math.round(window.LLM.progress * 100) + '%'); return; }
    showBubble('開始下載 AI 大腦（約 1GB，只需第一次）…');
    try {
      await window.LLM.load((p) => { btn.textContent = '🧠 ' + Math.round((p.progress || 0) * 100) + '%'; });
      btn.textContent = '🧠✓'; btn.classList.add('llm-on');
      btn.setAttribute('aria-pressed', 'true');
      speak('AI 大腦啟用完成，現在我可以聊得更自然囉！');
    } catch (e) { btn.textContent = '🧠✗'; showBubble('AI 大腦載入失敗：' + (e && e.message || e)); }
  };

  // 啟用本機 Ollama 時：開機 ping 一下，連上就把 🧠 切成「本機大腦」狀態
  (async function initOllama() {
    if (!window.OLLAMA || !window.OLLAMA.enabled) return;
    const btn = document.getElementById('btn-llm');
    if (btn) { btn.textContent = '🧠…'; btn.title = '本機 Ollama 大腦（連線中）'; }
    const ok = await window.OLLAMA.ping();
    if (btn) {
      btn.textContent = ok ? '🧠本機' : '🧠✗';
      btn.classList.toggle('llm-on', ok);
      btn.setAttribute('aria-pressed', String(ok));
      btn.title = ok ? ('本機 Ollama：已連線 ' + window.OLLAMA.model) : '本機 Ollama 連不上（檢查 Ollama 是否在跑 / CORS）';
    }
    if (ok) setTimeout(() => showBubble('已接上本機 AI 大腦（' + window.OLLAMA.model + '）🧠 問我問題吧！'), 1300);
  })();

  // 所有狀態與函式都已完成初始化後才啟動引擎，避免非同步載入期間被後續 var 初始化覆寫。
  if (isEmbedded || devBypass) {
    prepareTapGreeting().catch(() => {}); // 模型載入期間同步暖機，點擊時通常可直接播放
    initEngines();
  }
  </script>
</body>
