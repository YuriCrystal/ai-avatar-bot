<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>換皮試玩：Mao（Live2D 官方範例）</title>
<style>
  body{font-family:"Noto Sans TC",system-ui,sans-serif;margin:0;min-height:100vh;
       display:grid;place-items:center;background:linear-gradient(135deg,#eef1ff,#f7f8ff);color:#222033}
  .card{max-width:560px;padding:32px;text-align:center}
  h1{font-size:21px;margin:0 0 12px}
  p{color:#556;line-height:1.8;margin:8px 0}
  code{background:#fff;padding:2px 7px;border-radius:6px;font-size:13px}
  .note{font-size:13px;color:#8890a6;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <h1>🎭 換皮試玩：<code>Mao</code>（Live2D 官方範例）</h1>
    <p>右下角虛擬人現在的「皮」是 Live2D 官方 SDK 提供的 <code>Mao</code> 範例角色。</p>
    <p><strong>大腦維持預設（知識庫模式）</strong>，要接哪顆大腦由你自己決定。</p>
    <p class="note">正式上線請換成你擁有使用權的模型，並用 <code>data-model</code> 指向其 <code>model3.json</code>。</p>
  </div>

  <!-- 只換皮：使用固定版本的 Live2D 官方範例；不設 data-ollama → 大腦保持預設 -->
  <script src="embed.js?v=1.1.0"
          data-model="https://cdn.jsdelivr.net/gh/Live2D/CubismWebSamples@b1de66b0b1f1cb881d95fb6158622aeb6a2827bd/Samples/Resources/Mao/Mao.model3.json"
          data-open="true"></script>
</body>
</html>
